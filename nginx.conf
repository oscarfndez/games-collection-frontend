server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /gamescollection/ {
        try_files $uri $uri/ /gamescollection/index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
